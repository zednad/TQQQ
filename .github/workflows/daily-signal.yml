name: Daily Strategy Signal

on:
  # Run weekdays at 22:00 UTC ≈ 5 PM ET (winter) / 6 PM ET (summer).
  # US market closes at 4 PM ET; this leaves ~1-2h buffer for yfinance to settle.
  schedule:
    - cron: '0 22 * * 1-5'

  # Allow manual triggering from the Actions tab.
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit refreshed data + state.json back to the repo

concurrency:
  group: daily-signal
  cancel-in-progress: false

jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh QQQ / TQQQ / SPY data
        run: python update_data.py

      - name: Run signal check + send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signal_check.py

      - name: Commit updated data + state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ state.json
          if git diff --cached --quiet; then
            echo "No data or state changes to commit."
          else
            git commit -m "daily: $(date -u +%Y-%m-%d) signal update"
            git push
          fi
