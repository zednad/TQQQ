name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]

  # Commits made by the daily-signal workflow use GITHUB_TOKEN and therefore
  # do not fire push events, so also rebuild on a schedule shortly after it
  # (daily-signal runs at 22:00 UTC on weekdays).
  schedule:
    - cron: '30 22 * * 1-5'

  # Allow manual triggering from the Actions tab.
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild dashboard from latest data
        run: python build_dashboard.py

      - name: Stage site
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
