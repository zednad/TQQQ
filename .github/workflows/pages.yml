name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]

  # Commits made by the daily-signal workflow use GITHUB_TOKEN and therefore
  # do not fire push events, so also rebuild on a schedule shortly after it
  # (daily-signal runs at 22:00 UTC on weekdays).
  schedule:
    - cron: '30 22 * * 1-5'

  # Allow manual triggering from the Actions tab.
  workflow_dispatch: {}

permissions:
  contents: write   # needed to push the built site to the gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild dashboard from latest data
        run: python build_dashboard.py

      # Publish by force-pushing a single-commit gh-pages branch; GitHub Pages
      # serves it directly (Settings -> Pages -> Deploy from branch: gh-pages).
      - name: Publish to gh-pages branch
        run: |
          mkdir -p /tmp/site
          cp dashboard.html /tmp/site/index.html
          touch /tmp/site/.nojekyll
          cd /tmp/site
          git init -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
